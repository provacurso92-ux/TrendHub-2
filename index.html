<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='bold' fill='%238B5CF6'>T</text></svg>" />
    <!-- Permissions policy to avoid console warnings and restrict sensitive features -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()" />
    <title>TrendHub - Rede Social de Trends e Comunidades</title>
    <script>
      // Apply theme before React mounts to avoid FOUC
      (function() {
        try {
          var stored = null;
          try { stored = localStorage.getItem('theme'); } catch(e) { /* access denied */ }
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          console.error('Theme init error', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
